# Server Settings
server.port=8080

# Database Settings
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Colombo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Colombo
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom JWT Settings (HS256 requires at least a 256-bit key - using a 64-character hex string)
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# AWS S3 Settings
aws.s3.bucket-name=${S3_BUCKET_NAME:hospital-medical-imaging-grp7}
aws.region=${AWS_REGION:eu-north-1}

# Timezone Configuration (Sri Lanka Time)
spring.jackson.time-zone=Asia/Colombo

# Google OAuth Client ID Configuration
google.client-id=${GOOGLE_CLIENT_ID:}
